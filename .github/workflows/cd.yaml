name: Glossing Entries Deploy
on:
  pull_request:
    branches: main
jobs:
  merge-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - name: Merge with main
        uses: devmasx/merge-branch@master
        with:
          type: now
          from_branch: main
          target_branch: ${{ github.head_ref }}
          github_token: ${{ secrets.BRY_PAT }}
          message: Merge main into this branch to deploy to dev for testing.
  test:
    needs: merge-branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - run: npm install
      - run: npm test
  deploy:
    if: github.event.pull_request.draft == false
    needs: [merge-branch, test]
    strategy:
      matrix:
        machines: [vlcdhp02]
    runs-on: ${{ matrix.machines }}
    steps:
      - uses: actions/checkout@master
      - name: Deploy to server
        run: |
          DEPLOY_DIR="/opt/tomcat/webapps/glossing"
          if [ -d "$DEPLOY_DIR/.git" ]; then
            cd "$DEPLOY_DIR"
            git stash
            git checkout main
            git pull
            git checkout $GITHUB_HEAD_REF
            git pull
          else
            # Fresh clone - remove old files first
            rm -rf "$DEPLOY_DIR"/*
            rm -rf "$DEPLOY_DIR"/.[!.]*
            git clone --branch $GITHUB_HEAD_REF https://github.com/CenterForDigitalHumanities/glossing-entries.git "$DEPLOY_DIR"
          fi
