name: Glossing Entries Deploy
on:
  pull_request:
    branches: main
jobs:
  merge-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - name: Merge with main
        uses: devmasx/merge-branch@master
        with:
          type: now
          from_branch: main
          target_branch: ${{ github.head_ref }}
          github_token: ${{ secrets.BRY_PAT }}
          message: Merge main into this branch to deploy to dev for testing.
  test:
    needs: merge-branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - run: npm install
      - run: npm test
  deploy:
    if: github.event.pull_request.draft == false
    needs: [merge-branch, test]
    strategy:
      matrix:
        machines: [vlcdhp02]
    runs-on: ${{ matrix.machines }}
    steps:
      - uses: actions/checkout@master
      - name: Deploy to server
        run: |
          DEPLOY_DIR="/opt/tomcat/webapps/glossing"
          rm -rf "$DEPLOY_DIR"/*
          rm -rf "$DEPLOY_DIR"/.[!.]*
          cp -r * "$DEPLOY_DIR/"
          cp .gitignore "$DEPLOY_DIR/" 2>/dev/null || true
