<!DOCTYPE html>
<html lang="en">

<head>
    <title>Import Glosses - Gallery of Glosses</title>
    <link rel="stylesheet" href="css/gloss.css">
    <link href="favicon.ico" rel="icon" type="image/x-icon" />
    <script src="js/auth.js" type="module"></script>
    <script src="js/deer.js" type="module"></script>
    <script src="js/layout.js" type="module"></script>
    <script src="js/glossModal.js" type="module"></script>
    <script src="js/shared.js"></script>
    <style>
        input.required {
            border: 1px solid black;
        }

        .pageContainer.is-toggled {
            visibility: hidden;
            height: 0px;
        }

        .loadingMsg {
            color: white;
            padding-top: 4em;
        }

        line:nth-child(2n) {
            background-color: unset;
        }

        nav[user-input] {
            margin-bottom: 1em;
        }

        nav[user-input] a {
            cursor: pointer;
        }

        #reset {
            cursor: pointer;
        }
    </style>
</head>

<body class="container">
    <gog-header class="container"></gog-header>

    <div class="bg-basic">
        <h2> Import Gloss Collection </h2>
        <p>
            Parse external texts to connect or create Gallery Glosses
        </p>
        <div id="needs" class="row">
            <div class="col-6">
                <input id="externalURI" type="text" placeholder="The Text Witness URI" />
                <input id="checkURI" type="button" role="button" value="Check Link" />
            </div>
            <div class="col-6">
                <input id="resourceFile" type="file" placeholder="Select a File" />
                <textarea disabled id="fileText">Awaiting file contents...</textarea>
                <input id="loadFile" placeholder="The only supported file type is " .txt" at this time." type="button"
                    class="is-hidden" onclick="loadUserInput(event, 'file')" value="Use File Content" />
            </div>
        </div>
        <!-- Perhaps this could be a Custom Element widget of some kind -->
        <div id="loading" class="witness-needed is-hidden">
            <p class="loadingMsg">
                Please be patient while we get things together...
            </p>
        </div>
    </div>
    <gog-footer class="row"></gog-footer>
    <div id="globalFeedback" class="card is-center"></div>
    <gloss-modal class="is-hidden"></gloss-modal>
    <!-- <script src="js/gloss-witness.js"></script> -->
</body>
<script>
    addEventListener('DOMContentLoaded', () => {

        checkURI.addEventListener('click', ev => {
            function* spinners(){
                while(true){
                    for(const char of ['猗庘“', '猗庘　', '猗庘', '猗庘牨', '鉅庘”', '猗娾”', '猗屸”', '猗嗏”']){
                        yield char
                    }
                }
            }
            let char
            const spinning = setInterval(() => {
                checkURI.innerText = spinners().next().value
            },
                100)
            fetch(externalURI.value, {
                method: 'HEAD',
                mode: 'cors',
                cache: 'no-cache'
            }).then(res => {
                if (!res.ok) { throw new Error('The resource at this URI does not exist or is not accessible.') }
                externalURI.classList.remove('bd-error')
                externalURI.classList.add('bd-success')
                externalURI.title = 'This URI is valid'
            }).catch(err => {
                externalURI.classList.remove('bd-success')
                externalURI.classList.add('bd-error')
                externalURI.title = 'This URI is invalid'
                externalURI.dataset.error = err.message
            }).finally(() => {
                clearInterval(spinning)
                checkURI.innerText = 'Check'
            })
        })
        /**
         * Make sure DEER forms do not submit when a user hits "Enter".
         */
        document.querySelectorAll("form[deer-type]").forEach(form => {
            form.addEventListener("keydown", (e) => {
                if (e.keyIdentifier == 'U+000A' || e.keyIdentifier == 'Enter' || e.keyCode == 13) {
                    if (e.target.nodeName == 'INPUT' && e.target.type == 'text') {
                        e.preventDefault()
                    }
                }
            }, true)
        })
    })
</script>

</html>
